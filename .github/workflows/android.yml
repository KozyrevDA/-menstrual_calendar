name: Android CI

on:
  push:
    branches: [ main, 'release/**' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: |
          set -o pipefail
          ./gradlew :composeApp:testDebugUnitTest --stacktrace 2>&1 | tee build-tests.log

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew :composeApp:assembleDebug 2>&1 | tee build-apk.log

      - name: Verify R8 release build (unsigned)
        run: |
          set -o pipefail
          ./gradlew :composeApp:assembleRelease -Pci.unsigned=true 2>&1 | tee build-release.log
          ls -la composeApp/build/outputs/apk/release/

      - name: Upload unsigned release (size check)
        uses: actions/upload-artifact@v4
        with:
          name: release-unsigned-r8-check
          path: composeApp/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luna-debug-apk-v0.1.0-build${{ github.run_number }}
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Report failure as commit comment
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### CI failure — key errors'
            echo '```'
            grep -E "^e: |error:|> Task .* FAILED|What went wrong|Caused by:|Unresolved reference|expecting" \
              -h build-*.log 2>/dev/null | head -c 5000 || true
            echo
            echo '--- tail ---'
            tail -c 2500 build-*.log 2>/dev/null || true
            echo '```'
          } > report.md
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -f body="$(cat report.md)" || true
