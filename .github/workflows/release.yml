name: Release build

# Только ручной запуск. Перед первым запуском добавьте в Settings → Secrets → Actions:
#   ANDROID_KEYSTORE_BASE64  — base64 -w0 menstrual-calendar-release.jks
#   ANDROID_STORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64" || { echo "::error::Secret ANDROID_KEYSTORE_BASE64 не задан"; exit 1; }
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          # секреты не печатаются: GitHub маскирует значения, echo самих переменных нет
          {
            echo "storeFile=$RUNNER_TEMP/release.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Unit tests
        run: ./gradlew :composeApp:test

      - name: Build signed release APK
        run: ./gradlew :composeApp:assembleRelease

      - name: Compute SHA-256
        run: |
          cd composeApp/build/outputs/apk/release
          sha256sum *.apk | tee SHA256SUMS.txt

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: luna-release-apk-v0.1.0-build${{ github.run_number }}
          path: |
            composeApp/build/outputs/apk/release/*.apk
            composeApp/build/outputs/apk/release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90

      - name: Cleanup signing material
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/release.jks" keystore.properties
          echo "keystore и keystore.properties удалены"
